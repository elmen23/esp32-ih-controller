name: Build STM32 IH Controller

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build PlatformIO project
        run: pio run

      - name: Upload firmware binary
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            .pio/build/blackpill_f411ce/firmware.bin
            .pio/build/blackpill_f411ce/bootloader.bin
            .pio/build/blackpill_f411ce/partition-table.bin
